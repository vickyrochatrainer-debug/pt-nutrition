<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PT Nutrition Generator</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#16213e">
  <link rel="apple-touch-icon" href="/icons/icon-192.svg">
  <link rel="stylesheet" href="/styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <div class="app">
    <header>
      <h1>PT Nutrition Generator</h1>
      <p class="subtitle">Personalized Nutrition Guidance</p>
    </header>

    <main>
      <!-- Step 1: Select Client -->
      <section id="step-client" class="step active">
        <div class="step-header">
          <span class="step-number">1</span>
          <h2>Select Client</h2>
        </div>
        <div class="card">
          <div class="search-box">
            <input type="text" id="client-search" placeholder="Search by name or email..." disabled>
          </div>
          <div id="client-list" class="client-list">
            <p class="loading">Loading clients from Google Sheets...</p>
          </div>
        </div>
      </section>

      <!-- Step 2: Client Data -->
      <section id="step-data" class="step">
        <div class="step-header">
          <span class="step-number">2</span>
          <h2>Client Data</h2>
        </div>
        <div class="card">
          <div id="questionnaire-summary" class="questionnaire-summary"></div>
          <div id="previous-plan-section"></div>

          <h3>Body Metrics</h3>
          <div class="form-grid">
            <div class="form-group">
              <label for="weight">Current Weight (lbs)</label>
              <input type="number" id="weight" step="0.1">
            </div>
            <div class="form-group">
              <label for="goal-weight">Goal Weight (lbs)</label>
              <input type="number" id="goal-weight" step="0.1">
            </div>
            <div class="form-group">
              <label for="height">Height (inches)</label>
              <input type="number" id="height" step="0.1">
            </div>
            <div class="form-group">
              <label for="body-fat">Body Fat %</label>
              <input type="number" id="body-fat" step="0.1" placeholder="Optional">
            </div>
            <div class="form-group">
              <label for="age">Age</label>
              <input type="number" id="age">
            </div>
            <div class="form-group">
              <label for="gender">Gender</label>
              <select id="gender">
                <option value="female">Female</option>
                <option value="male">Male</option>
              </select>
            </div>
            <div class="form-group">
              <label for="activity-level">Activity Level</label>
              <select id="activity-level">
                <option value="1.2">Sedentary (office job)</option>
                <option value="1.375">Lightly Active (1-3 days/week)</option>
                <option value="1.55" selected>Moderately Active (3-5 days/week)</option>
                <option value="1.725">Very Active (6-7 days/week)</option>
                <option value="1.9">Extremely Active (athlete)</option>
              </select>
            </div>
          </div>

          <h3>Goal</h3>
          <div class="form-grid">
            <div class="form-group full-width">
              <select id="goal">
                <option value="fat-loss">Fat Loss</option>
                <option value="muscle-gain">Muscle Gain</option>
                <option value="body-recomposition">Body Recomposition</option>
                <option value="maintenance">Maintenance</option>
              </select>
            </div>
          </div>

          <h3>Meals Per Day</h3>
          <div class="form-grid">
            <div class="form-group full-width">
              <select id="meals-per-day">
                <option value="2">2 meals</option>
                <option value="3">3 meals</option>
                <option value="4">4 meals</option>
                <option value="5">5 meals</option>
                <option value="6">6 meals</option>
              </select>
            </div>
          </div>

          <h3>Personal Note to Client</h3>
          <div class="form-group full-width">
            <textarea id="personal-note" rows="4" placeholder="Write a custom message to your client (optional)..."></textarea>
          </div>

          <button id="btn-generate" class="btn-primary">Generate Nutrition Plan</button>
        </div>
      </section>

      <!-- Step 3: Nutrition Plan -->
      <section id="step-plan" class="step">
        <div class="step-header">
          <span class="step-number">3</span>
          <h2>Nutrition Guidance</h2>
        </div>
        <div class="card" id="nutrition-plan">
          <!-- Generated content goes here -->
        </div>
        <button id="btn-export" class="btn-primary">Export as PDF</button>
        <button id="btn-back" class="btn-secondary">Back to Edit</button>
      </section>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
